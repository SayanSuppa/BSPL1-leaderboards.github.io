<!DOCTYPE html>
<html>
<head>
  <title>PL1 Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🏆 Global PL1 Leaderboard</h1>
</header>

<div class="table">

  <div class="row header">
    <div>Rank</div>
    <div>Player</div>
    <div>Trophies</div>
    <div>Status</div>
  </div>

  <!-- dynamic rows go here -->
  <div id="rows"></div>

</div>

<script>
async function loadLeaderboard() {
  const container = document.getElementById("rows");

  // loading state
  container.innerHTML = `<div class="row">Loading...</div>`;

  try {
    const res = await fetch("https://your-api.com/leaderboard");
    const data = await res.json();

    container.innerHTML = "";

    data.forEach(player => {
      const row = document.createElement("a");
      row.className = "row";
      row.href = `player.html?tag=${encodeURIComponent(player.tag)}`;

      row.innerHTML = `
        <div>#${player.rank}</div>
        <div>${player.name}</div>
        <div>${player.trophies}</div>
        <div>${player.is_full_pl1 ? "PL1 ✅" : "Broken ❌"}</div>
      `;

      container.appendChild(row);
    });

  } catch (e) {
    container.innerHTML = `<div class="row">Failed to load data</div>`;
    console.error(e);
  }
}

loadLeaderboard();
</script>

</body>
</html>
