<!DOCTYPE html>
<html>
<head>
  <title>Player Profile</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1 id="name">Player Profile</h1>
  <p id="tag"></p>
</header>

<script>
const params = new URLSearchParams(window.location.search);
const tag = params.get("tag");

async function loadPlayer() {
  const res = await fetch(`https://pl1-backend.onrender.com/player/${tag}`);
  const data = await res.json();

  document.getElementById("name").innerText = data.name;
  document.getElementById("tag").innerText = data.tag;

  document.querySelector(".card").innerHTML = `
    <h2>🏆 Stats</h2>
    <p>Trophies: <b>${data.trophies}</b></p>
    <p>Status: <b>${data.is_full_pl1 ? "Full PL1 ✅" : "Not PL1 ❌"}</b></p>
  `;
}

loadPlayer();
</script>

</body>
</html>
