<!DOCTYPE html>
<html>
<head>
  <title>Submit PL1</title>
</head>

<body style="background:#0b0c10;color:white;font-family:Arial;text-align:center;">

<h1>Submit your PL1 account</h1>

<input id="tag" placeholder="#GRJ0L9C82" style="padding:10px;">
<button onclick="test()">Check</button>

<script>
async function test() {
  console.log("BUTTON CLICKED");

  const res = await fetch("https://pl1-backend.onrender.com/submit", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ tag: "#GRJ0L9C82" })
  });

  const data = await res.json();
  console.log(data);
}
</script>

<p id="result"></p>

<script>
async function submitTag() {
  const tag = document.getElementById("tag").value;
  
  console.log("SUBMIT TAG RECEIVED:", tag);
  console.log("API KEY EXISTS:", !!API_KEY);

  const res = await fetch("https://pl1-backend.onrender.com/submit", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ tag })
  });

  const data = await res.json();

  document.getElementById("result").innerText = data.message;
}
</script>

</body>
</html>
